services:
  postgres-mcp-tool:
    build:
      context: .
    image: postgres-mcp-tool
    command: ["python", "-m", "sql_mcp_server.server"]
    restart: on-failure
    stdin_open: true
    tty: false
    environment:
      PG_SCHEMA: ${PG_SCHEMA:-public}
      PG_MAX_ROWS: ${PG_MAX_ROWS:-200}
      PG_STATEMENT_TIMEOUT_MS: ${PG_STATEMENT_TIMEOUT_MS:-10000}
      PG_SESSION_TTL_HOURS: ${PG_SESSION_TTL_HOURS:-24}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-streamable-http}
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PORT: ${MCP_PORT:-3005}
      PYTHONPATH: /app/src
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3005:3005"
    networks:
      - mcp-shared-net
    volumes:
      - ./src:/app/src:ro
      - ./pyproject.toml:/app/pyproject.toml:ro

networks:
  mcp-shared-net:
    name: mcp-shared-net
    external: true
