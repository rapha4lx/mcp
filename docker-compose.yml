services:
  sessiondb-mcp:
    build:
      context: .
    image: sessiondb-mcp
    container_name: sessiondb-mcp
    command: ["sessiondb-mcp"]
    restart: on-failure
    stdin_open: true
    tty: false
    environment:
      PG_SCHEMA: ${PG_SCHEMA:-public}
      PG_MAX_ROWS: ${PG_MAX_ROWS:-200}
      PG_STATEMENT_TIMEOUT_MS: ${PG_STATEMENT_TIMEOUT_MS:-10000}
      PG_SESSION_TTL_HOURS: ${PG_SESSION_TTL_HOURS:-24}
      SQL_MCP_AUTO_INSTALL_DRIVERS: ${SQL_MCP_AUTO_INSTALL_DRIVERS:-false}
      SQL_MCP_EXPOSE_SESSION_TOKENS: ${SQL_MCP_EXPOSE_SESSION_TOKENS:-false}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-streamable-http}
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PORT: ${MCP_PORT:-3005}
      PYTHONPATH: /app/src
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3005:3005"
    volumes:
      - ./src:/app/src:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
